name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./prisma/local.db
      AUTH_SECRET: ci-auth-secret-please-change
      GITHUB_WEBHOOK_SECRET: ci-webhook-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap local database
        run: npm run db:setup

      - name: Verify application
        run: npm run check

  docker:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build demo container
        run: docker build -t internal-dev-portal .