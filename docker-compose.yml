services:
  postgres:
    image: postgres:16-alpine
    container_name: internal-dev-portal-postgres
    environment:
      POSTGRES_DB: internal_dev_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d internal_dev_portal"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  postgres-data: